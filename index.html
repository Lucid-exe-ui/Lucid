<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucid Archive Forum</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  setDoc,
  getDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK-Zi5f2v8DXNbJQ9_yfwv2V43SzqecYI",
  authDomain: "lucidarchiveforum.firebaseapp.com",
  projectId: "lucidarchiveforum",
  appId: "1:614045519869:web:5e4646a29f5f18d98c1394"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let isAdmin = false;
let isBanned = false;

/* ================= AUTH ================= */

window.login = async function () {
  const email = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    document.getElementById("error").innerText = e.message;
  }
};

window.register = async function () {
  const email = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", cred.user.uid), {
      email,
      banned: false
    });
  } catch (e) {
    document.getElementById("error").innerText = e.message;
  }
};

window.logout = function () {
  location.reload();
};

/* ================= USER STATE ================= */

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  currentUser = user;
  isAdmin = user.email === "admin@lucid.me.uk";

  const userDoc = await getDoc(doc(db, "users", user.uid));

  if (userDoc.exists()) {
    isBanned = userDoc.data().banned;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("forum").style.display = "block";
  document.getElementById("user").innerText = user.email;

  if (isBanned) {
    document.getElementById("banNotice").style.display = "block";
  }

  loadThreads();
});

/* ================= THREADS ================= */

window.createThread = async function () {
  if (isBanned) return alert("You are banned");

  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  await addDoc(collection(db, "threads"), {
    title,
    text,
    user: currentUser.email,
    time: Date.now()
  });
};

function loadThreads() {
  onSnapshot(collection(db, "threads"), (snap) => {
    const box = document.getElementById("threads");
    box.innerHTML = "";

    snap.forEach(docu => {
      const d = docu.data();

      const div = document.createElement("div");
      div.className = "thread";

      div.innerHTML = `
        <div class="threadTitle">${d.title}</div>
        <div class="threadInfo">Posted by ${d.user}</div>
        <div class="threadText">${render(d.text)}</div>
        ${isAdmin ? `<button onclick="delThread('${docu.id}')">Delete</button>` : ""}
        ${isAdmin ? `<button onclick="banUser('${d.user}')">Ban User</button>` : ""}
      `;

      box.appendChild(div);
    });
  });
}

window.delThread = async function (id) {
  await deleteDoc(doc(db, "threads", id));
};

window.banUser = async function (email) {
  const usersSnap = await getDocs(collection(db, "users"));

  usersSnap.forEach(async u => {
    if (u.data().email === email) {
      await setDoc(doc(db, "users", u.id), {
        ...u.data(),
        banned: true
      });
    }
  });

  alert("User banned");
};

/* ================= RENDER ENGINE ================= */

function render(text) {
  if (!text) return "";

  let html = text;

  /* escape */
  html = html.replace(/</g, "&lt;").replace(/>/g, "&gt;");

  /* markdown */
  html = html.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
  html = html.replace(/\*(.*?)\*/g, "<i>$1</i>");

  /* links */
  html = html.replace(
    /(https?:\/\/[^\s]+)/g,
    `<a href="$1" target="_blank">$1</a>`
  );

  /* youtube */
  html = html.replace(
    /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
    `<iframe width="320" height="180"
      src="https://www.youtube.com/embed/$1"
      frameborder="0" allowfullscreen></iframe>`
  );

  /* images */
  html = html.replace(
    /(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/g,
    `<img src="$1" style="max-width:300px;border-radius:6px;">`
  );

  /* discord embeds */
  html = html.replace(
    /(https?:\/\/discord\.gg\/[^\s]+)/g,
    `<div class="discord">Discord Invite: <a href="$1">$1</a></div>`
  );

  return html;
}
</script>

<style>
body{background:#111;color:#ddd;font-family:Arial}
.wrapper{width:900px;margin:auto}
.thread{background:#222;padding:10px;margin:10px 0;border:1px solid #444}
.threadTitle{color:#8bc53f;font-size:18px}
.threadText img{max-width:100%}
.discord{background:#2b2f3a;padding:8px;margin-top:5px}
button{margin-top:5px}
#banNotice{display:none;background:red;padding:10px;margin:10px 0}
</style>
</head>

<body>

<div class="wrapper">

<div id="login">
<h2>Login</h2>
<input id="username" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<div id="error"></div>
</div>

<div id="forum" style="display:none">

<h2>Welcome <span id="user"></span></h2>

<div id="banNotice">
🚫 You are banned. You can view posts but cannot create threads.
</div>

<input id="title" placeholder="Thread title"><br>
<textarea id="text" placeholder="Write post..."></textarea><br>

<button onclick="createThread()">Post Thread</button>

<div id="threads"></div>

</div>

</div>

</body>
</html>
