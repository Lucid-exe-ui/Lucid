<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lucid Archive Forum</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #ddd;
  font-family: Arial, sans-serif;
}

header {
  background: #111;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 2px solid #39ff14;
}

.container {
  width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  border: 1px solid #2a2a2a;
  padding: 12px;
  margin-top: 10px;
  border-radius: 5px;
}

.title {
  color: #39ff14;
  font-weight: bold;
  font-size: 16px;
}

.small {
  font-size: 12px;
  color: #aaa;
}

input, textarea {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  background: #0f0f0f;
  border: 1px solid #333;
  color: white;
}

button {
  padding: 6px 10px;
  background: #39ff14;
  border: none;
  cursor: pointer;
  color: black;
  font-weight: bold;
}

button:hover {
  background: #2bd10f;
}

.post-content {
  margin-top: 5px;
  white-space: pre-wrap;
}

a {
  color: #4da3ff;
}

iframe {
  width: 100%;
  height: 315px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>Lucid Archive Forum</header>

<div class="container">

<div id="authBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="forum" style="display:none;">

<h3 id="welcome"></h3>

<div class="card">
  <input id="title" placeholder="Thread title">
  <textarea id="content" placeholder="Write post..."></textarea>
  <button onclick="createThread()">Post Thread</button>
</div>

<div id="posts"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "lucidarchiveforum.firebaseapp.com",
  projectId: "lucidarchiveforum",
  storageBucket: "lucidarchiveforum.appspot.com",
  messagingSenderId: "614045519869",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let isAdmin = false;
let isBanned = false;

/* AUTH */
window.login = async () => {
  await signInWithEmailAndPassword(auth,
    email.value, password.value);
};

window.register = async () => {
  await createUserWithEmailAndPassword(auth,
    email.value, password.value);
};

/* CHECK USER */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  currentUser = user;

  document.getElementById("authBox").style.display = "none";
  document.getElementById("forum").style.display = "block";

  document.getElementById("welcome").innerText =
    "Welcome " + user.email;

  // user doc
  const ref = doc(db, "users", user.email);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      banned: false,
      role: user.email === "admin@lucid.me.uk" ? "admin" : "user"
    });
  }

  const data = (await getDoc(ref)).data();

  isAdmin = data.role === "admin";
  isBanned = data.banned;

  loadPosts();
});

/* CREATE THREAD */
window.createThread = async () => {
  if (isBanned) return alert("You are banned");

  await addDoc(collection(db, "posts"), {
    title: title.value,
    content: content.value,
    user: currentUser.email,
    time: Date.now()
  });

  title.value = "";
  content.value = "";
};

/* DELETE */
window.deletePost = async (id) => {
  await deleteDoc(doc(db, "posts", id));
};

/* BAN */
window.banUser = async (email) => {
  if (!isAdmin) return;

  await setDoc(doc(db, "users", email), {
    banned: true,
    role: "user"
  });
  alert("User banned");
};

/* LOAD POSTS */
function loadPosts() {
  onSnapshot(collection(db, "posts"), (snap) => {
    posts.innerHTML = "";

    snap.forEach(docu => {
      const d = docu.data();

      let html = formatContent(d.content);

      let post = document.createElement("div");
      post.className = "card";

      post.innerHTML = `
        <div class="title">${d.title}</div>
        <div class="small">Posted by ${d.user}</div>
        <div class="post-content">${html}</div>
      `;

      if (isAdmin) {
        post.innerHTML += `
          <button onclick="deletePost('${docu.id}')">Delete</button>
          <button onclick="banUser('${d.user}')">Ban User</button>
        `;
      }

      posts.appendChild(post);
    });
  });
}

/* EMBEDS + MARKDOWN FIX */
function formatContent(text) {

  // links
  text = text.replace(
    /(https?:\/\/[^\s]+)/g,
    url => {
      if (url.includes("youtube.com/watch")) {
        const id = url.split("v=")[1];
        return `<iframe src="https://www.youtube.com/embed/${id}" frameborder="0"></iframe>`;
      }

      if (url.includes("youtu.be")) {
        const id = url.split("/").pop();
        return `<iframe src="https://www.youtube.com/embed/${id}" frameborder="0"></iframe>`;
      }

      return `<a href="${url}" target="_blank">${url}</a>`;
    }
  );

  // bold
  text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

  // line breaks
  text = text.replace(/\n/g, "<br>");

  return text;
}
</script>

</body>
</html>
