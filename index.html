<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucid Archive Forum</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,Arial,sans-serif;
}

body{
    background:#111;
    color:#d7d7d7;
}

.wrapper{
    width:1000px;
    margin:20px auto;
}

.header{
    background:#2b2b2b;
    border:1px solid #444;
    padding:18px;
}

.logo{
    font-size:34px;
    font-weight:bold;
}

.logo span{ color:#8bc53f; }

.nav{
    background:#3a3a3a;
    border:1px solid #444;
    padding:10px;
    display:flex;
    gap:10px;
}

.nav button{
    background:#6ca52d;
    color:white;
    border:none;
    padding:8px 15px;
    cursor:pointer;
}

.box{
    background:#232323;
    border:1px solid #444;
    margin-top:15px;
}

.boxTitle{
    background:#303030;
    padding:10px;
    font-weight:bold;
}

.content{
    padding:20px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    background:#181818;
    border:1px solid #555;
    color:white;
}

button{
    background:#6ca52d;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

.thread{
    background:#2a2a2a;
    border:1px solid #444;
    padding:15px;
    margin-top:10px;
}

.threadTitle{
    color:#8bc53f;
    font-size:18px;
    font-weight:bold;
}

.threadInfo{
    color:#999;
    font-size:12px;
    margin-top:5px;
}

.threadText{
    margin-top:10px;
    white-space:pre-wrap;
}

#forum{ display:none; }

.error{ color:#ff6666; margin-top:10px; }

#createBox{
    display:none;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<div class="logo">lucid<span>archive</span> forum</div>
</div>

<div class="nav">
<button onclick="showCreate()">New Thread</button>
<button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="login">
<div class="box">
<div class="boxTitle">Login / Register</div>
<div class="content">

Email<br>
<input id="email"><br>

Password<br>
<input id="password" type="password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<div class="error" id="error"></div>

</div>
</div>
</div>

<!-- FORUM -->
<div id="forum">

<div class="box">
<div class="boxTitle">Welcome <span id="user"></span></div>
<div class="content">

<!-- CREATE THREAD -->
<div id="createBox">
<h3>Create Thread</h3>
<input id="title" placeholder="Thread title">
<textarea id="content" placeholder="Write your thread..."></textarea>
<button onclick="createThread()">Post Thread</button>
</div>

<!-- THREADS -->
<div id="threads"></div>

</div>
</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK-Zi5f2v8DXNbJQ9_yfwv2V43SzqecYI",
  authDomain: "lucidarchiveforum.firebaseapp.com",
  projectId: "lucidarchiveforum",
  storageBucket: "lucidarchiveforum.appspot.com",
  messagingSenderId: "614045519869",
  appId: "1:614045519869:web:5e4646a29f5f18d98c1394"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* AUTH STATE (fixes refresh logout bug) */
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("login").style.display = "none";
        document.getElementById("forum").style.display = "block";
        document.getElementById("user").innerText = user.email;

        loadThreads();
    } else {
        document.getElementById("login").style.display = "block";
        document.getElementById("forum").style.display = "none";
    }
});

/* LOGIN */
window.login = async function () {
    try {
        await signInWithEmailAndPassword(
            auth,
            document.getElementById("email").value,
            document.getElementById("password").value
        );
    } catch (e) {
        document.getElementById("error").innerText = e.message;
    }
};

/* REGISTER */
window.register = async function () {
    try {
        await createUserWithEmailAndPassword(
            auth,
            document.getElementById("email").value,
            document.getElementById("password").value
        );
    } catch (e) {
        document.getElementById("error").innerText = e.message;
    }
};

/* LOGOUT */
window.logout = async function () {
    await signOut(auth);
};

/* SHOW CREATE BOX */
window.showCreate = function () {
    document.getElementById("createBox").style.display = "block";
};

/* CREATE THREAD */
window.createThread = async function () {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title || !content) return;

    await addDoc(collection(db, "threads"), {
        user: auth.currentUser.email,
        title,
        content,
        time: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    document.getElementById("createBox").style.display = "none";
};

/* LOAD THREADS */
function loadThreads() {
    const q = query(collection(db, "threads"), orderBy("time", "desc"));

    onSnapshot(q, (snapshot) => {
        const container = document.getElementById("threads");
        container.innerHTML = "";

        snapshot.forEach(doc => {
            const t = doc.data();

            container.innerHTML += `
                <div class="thread">
                    <div class="threadTitle">${t.title}</div>
                    <div class="threadInfo">Posted by ${t.user}</div>
                    <div class="threadText">${t.content}</div>
                </div>
            `;
        });
    });
}
</script>

</body>
</html>
