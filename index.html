<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucid</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
--primary:#00ff88;
--secondary:#0aff9d;
--bg:#000;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Share Tech Mono', monospace;
}

body{
background:#000;
color:var(--primary);
height:300vh;
overflow-x:hidden;
transition:1s;
}

/* MATRIX BACKGROUND */

.matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

canvas{
display:block;
}

/* MAIN BIO */

.container{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

h1{
font-size:3rem;
text-shadow:0 0 10px var(--primary),0 0 25px var(--primary);
letter-spacing:3px;
}

.bio{
opacity:.8;
max-width:500px;
font-size:.9rem;
line-height:1.6;
}

.scroll-hint{
margin-top:10px;
opacity:.6;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:.2; transform:translateY(0)}
50%{opacity:1; transform:translateY(6px)}
}

/* LINKS */

.links{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.links a{
padding:10px 20px;
border:1px solid var(--primary);
text-decoration:none;
color:var(--primary);
transition:.3s;
background:rgba(0,0,0,.4);
}

.links a:hover{
box-shadow:0 0 12px var(--primary);
transform:scale(1.05);
}

/* FOOTER */

footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:.8rem;
opacity:.6;
z-index:2;
}

</style>
</head>

<body>

<div class="matrix">
<canvas id="matrix"></canvas>
</div>

<div class="container">

<h1>Lucid</h1>

<p class="bio">
> digital presence <br>
> systems enthusiast <br>
> exploring networks & code
</p>

<div class="scroll-hint" id="scrollHint">
▼ SCROLL ▼
</div>

<div class="links">

<a href="https://www.youtube.com/@Cruelhvh" target="_blank">YouTube</a>
<a href="https://discord.gg/bC9yejgM59" target="_blank">Contact</a>
<a href="https://steamcommunity.com/id/" target="_blank">Steam</a>
<a href="https://fakecrime.bio/lion" target="_blank">Fakecrime</a>
<a href="https://guns.lol/scrub" target="_blank">Guns.lol</a>

</div>

</div>

<footer>
© 2025 Lucid
</footer>

<script>

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--primary');
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

/* SCROLL COLOR CHANGE */

window.addEventListener("scroll",()=>{

const scroll=window.scrollY;
const max=document.body.scrollHeight-window.innerHeight;
const progress=scroll/max;

if(progress<0.33){

document.documentElement.style.setProperty('--primary','#00ff88');
document.documentElement.style.setProperty('--secondary','#0aff9d');

}
else if(progress<0.66){

document.documentElement.style.setProperty('--primary','#00e5ff');
document.documentElement.style.setProperty('--secondary','#66f7ff');

}
else{

document.documentElement.style.setProperty('--primary','#ff0088');
document.documentElement.style.setProperty('--secondary','#ff66bb');

}

document.getElementById("scrollHint").style.opacity =
scroll>100 ? "0" : "1";

});

</script>

</body>
</html>
