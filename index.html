<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucid Archive Forum</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,Arial,sans-serif;
}

body{
    background:#111;
    color:#d7d7d7;
}

.wrapper{
    width:1000px;
    margin:20px auto;
}

.header{
    background:#2b2b2b;
    border:1px solid #444;
    padding:18px;
}

.logo{
    font-size:34px;
    font-weight:bold;
}

.logo span{
    color:#8bc53f;
}

.nav{
    background:#3a3a3a;
    border:1px solid #444;
    border-top:none;
    padding:10px;
}

.nav button{
    background:#6ca52d;
    color:white;
    border:none;
    padding:8px 15px;
    cursor:pointer;
    margin-right:10px;
}

.nav button:hover{
    background:#82c43c;
}

.box{
    background:#232323;
    border:1px solid #444;
    margin-top:15px;
}

.boxTitle{
    background:#303030;
    padding:10px;
    font-weight:bold;
}

.content{
    padding:20px;
}

input{
    width:260px;
    padding:8px;
    background:#181818;
    border:1px solid #555;
    color:white;
    margin-bottom:10px;
}

button{
    background:#6ca52d;
    color:white;
    border:none;
    padding:10px 25px;
    cursor:pointer;
}

.thread{
    background:#2a2a2a;
    border:1px solid #444;
    padding:15px;
    margin-top:10px;
}

.threadTitle{
    color:#8bc53f;
    font-size:18px;
    font-weight:bold;
}

.threadInfo{
    color:#9b9b9b;
    font-size:13px;
    margin-top:5px;
}

.threadText{
    margin-top:10px;
}

#forum{ display:none; }

.error{
    color:#ff6666;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<div class="logo">lucid<span>archive</span> forum</div>
</div>

<div class="nav">
<button onclick="createPost()">New Thread</button>
<button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="login">
<div class="box">
<div class="boxTitle">Login</div>
<div class="content">

Username (Email)<br>
<input id="username"><br>

Password<br>
<input id="password" type="password"><br>

<button onclick="login()">Login</button>

<div class="error" id="error"></div>

</div>
</div>
</div>

<!-- FORUM -->
<div id="forum">
<div class="box">
<div class="boxTitle">Welcome <span id="user"></span></div>

<div class="content" id="posts">

<!-- posts load here -->

</div>
</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK-Zi5f2v8DXNbJQ9_yfwv2V43SzqecYI",
  authDomain: "lucidarchiveforum.firebaseapp.com",
  projectId: "lucidarchiveforum",
  storageBucket: "lucidarchiveforum.appspot.com",
  messagingSenderId: "614045519869",
  appId: "1:614045519869:web:5e4646a29f5f18d98c1394"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function () {
    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);

        document.getElementById("login").style.display = "none";
        document.getElementById("forum").style.display = "block";
        document.getElementById("user").innerText = email;

        loadPosts();

    } catch (err) {
        document.getElementById("error").innerText = err.message;
    }
};

/* LOGOUT */
window.logout = async function () {
    await signOut(auth);

    document.getElementById("forum").style.display = "none";
    document.getElementById("login").style.display = "block";
};

/* CREATE THREAD */
window.createPost = async function () {
    const title = prompt("Thread title:");
    const text = prompt("Thread content:");

    if (!title || !text) return;

    await addDoc(collection(db, "posts"), {
        user: auth.currentUser.email,
        title,
        text,
        time: Date.now()
    });
};

/* LOAD POSTS */
function loadPosts() {
    const postsDiv = document.getElementById("posts");

    const q = query(collection(db, "posts"), orderBy("time", "desc"));

    onSnapshot(q, (snapshot) => {
        postsDiv.innerHTML = "";

        snapshot.forEach((doc) => {
            const p = doc.data();

            postsDiv.innerHTML += `
                <div class="thread">
                    <div class="threadTitle">${p.title}</div>
                    <div class="threadInfo">Posted by ${p.user}</div>
                    <div class="threadText">${p.text}</div>
                </div>
            `;
        });
    });
}
</script>

</body>
</html>
