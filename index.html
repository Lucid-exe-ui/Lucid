    if (!xmlDoc) return;

    function set(tag, value) {

        if (!node) {
            node = xmlDoc.createElement(tag);
            xmlDoc.documentElement.appendChild(node);
        }

    set("weatherType", settings.weather);

}

function drawLine(a, b, dist) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(255,0,0,${1 - dist / 160})`;
    ctx.lineWidth = 1;
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);

}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < nodes.length; i++) {
        let n = nodes[i];

        n.x += n.vx;
        n.y += n.vy;

        if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;

        ctx.fillStyle = "red";
        ctx.fillRect(n.x, n.y, 2, 2);

        for (let j = i + 1; j < nodes.length; j++) {
            let n2 = nodes[j];
            let dx = n.x - n2.x;
            let dy = n.y - n2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 140) drawLine(n, n2, dist);
        }
    }

    requestAnimationFrame(animate);
