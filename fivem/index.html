<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FiveM XML Editor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #0a0a0a;
    color: white;
    overflow: hidden;
}

/* BACKGROUND CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 70px;
    height: 100%;
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
}

.icon {
    width: 40px;
    height: 40px;
    margin: 10px 0;
    background: rgba(255,0,0,0.2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
}

.icon:hover {
    background: red;
    transform: scale(1.1);
}

/* MAIN */
.main {
    margin-left: 90px;
    padding: 30px;
}

.panel {
    display: none;
    background: rgba(30,30,30,0.6);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 15px;
    width: 420px;
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
}

.active {
    display: block;
}

input, select, button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: red;
    color: white;
    cursor: pointer;
}

/* FILE LABEL */
#fileName {
    font-size: 12px;
    opacity: 0.7;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="icon" onclick="show('upload')">📂</div>
    <div class="icon" onclick="show('weather')">🌤</div>
    <div class="icon" onclick="show('lightning')">⚡</div>
    <div class="icon" onclick="show('time')">🕒</div>
    <div class="icon" onclick="show('clouds')">☁️</div>
    <div class="icon" onclick="show('export')">📦</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- UPLOAD -->
<div id="upload" class="panel active">
    <h2>Upload XML</h2>
    <input type="file" id="fileInput">
    <p id="fileName"></p>
</div>

<!-- WEATHER -->
<div id="weather" class="panel">
    <h2>Weather</h2>
    <select id="weatherVal">
        <option>CLEAR</option>
        <option>RAIN</option>
        <option>THUNDER</option>
        <option>FOG</option>
    </select>
</div>

<!-- LIGHTNING -->
<div id="lightning" class="panel">
    <h2>Lightning Color</h2>
    <input type="color" id="lightColor">
</div>

<!-- TIME -->
<div id="time" class="panel">
    <h2>Day / Night Cycle</h2>
    <input type="range" min="0" max="24" id="timeVal">
</div>

<!-- CLOUDS -->
<div id="clouds" class="panel">
    <h2>Clouds</h2>
    <select id="cloudVal">
        <option>Default</option>
        <option>Storm</option>
        <option>Clear</option>
        <option>Foggy</option>
    </select>
</div>

<!-- EXPORT -->
<div id="export" class="panel">
    <h2>Export XML</h2>
    <button onclick="exportFile()">Download Edited XML</button>
</div>

</div>

<script>
/* =========================
   XML SYSTEM
========================= */
let xmlDoc = null;
let rawXML = "";

/* =========================
   SETTINGS
========================= */
const settings = {
    weather: "CLEAR",
    time: 12,
    clouds: "Default",
    lightning: "#ffffff"
};

/* =========================
   SWITCH PANELS
========================= */
function show(id) {
    document.querySelectorAll('.panel')
        .forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* =========================
   UPLOAD XML
========================= */
document.getElementById("fileInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById("fileName").innerText = file.name;

    const reader = new FileReader();
    reader.onload = (ev) => {
        rawXML = ev.target.result;

        const parser = new DOMParser();
        xmlDoc = parser.parseFromString(rawXML, "application/xml");
    };

    reader.readAsText(file);
});

/* =========================
   UI → SETTINGS
========================= */
document.getElementById("weatherVal").onchange = e => {
    settings.weather = e.target.value;
};

document.getElementById("timeVal").oninput = e => {
    settings.time = e.target.value;
};

document.getElementById("cloudVal").onchange = e => {
    settings.clouds = e.target.value;
};

document.getElementById("lightColor").oninput = e => {
    settings.lightning = e.target.value;
};

/* =========================
   APPLY XML CHANGES
========================= */
function applyXML() {
    if (!xmlDoc) return;

    function set(tag, value) {
        let node = xmlDoc.getElementsByTagName(tag)[0];

        if (!node) {
            node = xmlDoc.createElement(tag);
            xmlDoc.documentElement.appendChild(node);
        }

        node.textContent = value;
    }

    set("weatherType", settings.weather);
    set("timeOfDay", settings.time);
    set("cloudType", settings.clouds);
    set("lightningColor", settings.lightning);
}

/* =========================
   EXPORT XML
========================= */
function exportFile() {
    if (!xmlDoc) {
        alert("Upload XML first");
        return;
    }

    applyXML();

    const serializer = new XMLSerializer();
    const output = serializer.serializeToString(xmlDoc);

    const blob = new Blob([output], { type: "application/xml" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "edited_fivem.xml";
    a.click();
}

/* =========================
   BACKGROUND (CONNECTED NODES)
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let nodes = [];

for (let i = 0; i < 70; i++) {
    nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6
    });
}

function drawLine(a, b, dist) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(255,0,0,${1 - dist / 160})`;
    ctx.lineWidth = 1;
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < nodes.length; i++) {
        let n = nodes[i];

        n.x += n.vx;
        n.y += n.vy;

        if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;

        ctx.fillStyle = "red";
        ctx.fillRect(n.x, n.y, 2, 2);

        for (let j = i + 1; j < nodes.length; j++) {
            let n2 = nodes[j];
            let dx = n.x - n2.x;
            let dy = n.y - n2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 140) drawLine(n, n2, dist);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
