<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FiveM Visual Editor</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    background:#0a0a0a;
    color:white;
    overflow:hidden;
}

/* Background */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Sidebar */
.sidebar {
    position:fixed;
    left:0;
    top:0;
    width:70px;
    height:100%;
    background:rgba(20,20,20,0.8);
    backdrop-filter:blur(10px);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.icon {
    width:40px;
    height:40px;
    margin:10px 0;
    background:rgba(255,0,0,0.2);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.3s;
}

.icon:hover { background:red; transform:scale(1.1); }

/* Main */
.main {
    margin-left:90px;
    padding:30px;
}

.panel {
    display:none;
    background:rgba(30,30,30,0.6);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:15px;
    width:420px;
    box-shadow:0 0 20px rgba(255,0,0,0.2);
}

.active { display:block; }

input, select, button {
    width:100%;
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    background:red;
    color:white;
    cursor:pointer;
}

.preview {
    height:100px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Sidebar -->
<div class="sidebar">
    <div class="icon" onclick="show('upload')">📂</div>
    <div class="icon" onclick="show('weather')">🌤</div>
    <div class="icon" onclick="show('lightning')">⚡</div>
    <div class="icon" onclick="show('ped')">👤</div>
    <div class="icon" onclick="show('water')">🌊</div>
    <div class="icon" onclick="show('time')">🕒</div>
    <div class="icon" onclick="show('clouds')">☁️</div>
    <div class="icon" onclick="show('color')">🎨</div>
    <div class="icon" onclick="show('sky')">🖼</div>
    <div class="icon" onclick="show('export')">📦</div>
</div>

<div class="main">

<!-- UPLOAD -->
<div id="upload" class="panel active">
<h2>Upload Citizen / Timecycle</h2>
<input type="file" id="fileInput">
<p id="fileName"></p>
</div>

<!-- WEATHER -->
<div id="weather" class="panel">
<h2>Weather</h2>
<select id="weatherVal">
<option>CLEAR</option>
<option>RAIN</option>
<option>THUNDER</option>
<option>FOG</option>
</select>
</div>

<!-- LIGHTNING -->
<div id="lightning" class="panel">
<h2>Lightning</h2>
<input type="color" id="lightColor">
</div>

<!-- PED -->
<div id="ped" class="panel">
<h2>Ped Glow (UI only)</h2>
<input type="color" id="pedColor">
<input type="range" id="pedIntensity" min="0" max="50">
</div>

<!-- WATER -->
<div id="water" class="panel">
<h2>Water Effects (UI only)</h2>
<input type="color" id="waterColor">
</div>

<!-- TIME -->
<div id="time" class="panel">
<h2>Day/Night</h2>
<input type="range" id="timeVal" min="0" max="24">
</div>

<!-- CLOUDS -->
<div id="clouds" class="panel">
<h2>Clouds</h2>
<select id="cloudVal">
<option>Default</option>
<option>Storm</option>
<option>Clear</option>
</select>
</div>

<!-- COLOR -->
<div id="color" class="panel">
<h2>Color Keyframes (UI only)</h2>
<input type="color" id="color1">
<input type="color" id="color2">
</div>

<!-- SKY -->
<div id="sky" class="panel">
<h2>PNG Skybox</h2>
<input type="file" id="skyFile" accept="image/png">
</div>

<!-- EXPORT -->
<div id="export" class="panel">
<h2>Export Edited File</h2>
<button onclick="exportFile()">Download File</button>
</div>

</div>

<script>
// PANEL SWITCH
function show(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// FILE STORAGE
let uploadedContent = "";

// UPLOAD
document.getElementById("fileInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    document.getElementById("fileName").innerText = file.name;

    let reader = new FileReader();
    reader.onload = function(e){
        uploadedContent = e.target.result;
    };
    reader.readAsText(file);
});

// EXPORT
function exportFile() {
    if (!uploadedContent) {
        alert("Upload a file first");
        return;
    }

    let edited = uploadedContent + "\n\n--- Edited Settings ---\n";
    edited += "Weather: " + document.getElementById("weatherVal").value + "\n";
    edited += "Time: " + document.getElementById("timeVal").value + "\n";
    edited += "Clouds: " + document.getElementById("cloudVal").value + "\n";
    edited += "Lightning: " + document.getElementById("lightColor").value + "\n";

    const blob = new Blob([edited]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "edited_timecycle.txt";
    a.click();
}

// BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for (let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:Math.random()-0.5,
        vy:Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        ctx.fillStyle="red";
        ctx.fillRect(p.x,p.y,2,2);
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
